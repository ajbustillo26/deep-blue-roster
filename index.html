<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Blue Squad</title>
    <style>
        body { 
            font-family: Monospaced, Menlo, Consolas, 'Courier New', monospace; 
            background-color: lightblue; 
            color: #222
            text-align: center; 
            padding: 50px; 
        }
        
        h1 { 
            text-align: center;
            font-weight: 300; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            border-bottom: 1px solid #ddd; 
            padding-bottom: 20px; 
            display: inline-block; 
        }

        #roster { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            flex-wrap: wrap; 
            margin-top: 40px; 
        }
        .minimal-card { 
            background-color: blanchedalmond; 
            border: 1px solid #eaeaea; 
            padding: 25px; 
            width: 220px; 
            text-align: left; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
        }
        
        h3 { margin-top: 0; font-size: 1.2em; }
        
        .zone-label { 
            color: #0077cc; 
            font-size: 0.8em; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>deep blue diver scans </h1>
    <div id="roster">now playing whale sounds...</div>

    <script type="module" src="script.js"></script>
</body>
</html>
